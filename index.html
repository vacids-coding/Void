<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK OBFUSCATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #0a0c10;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1600px;
            background: #0d1117;
            border-radius: 16px;
            border: 1px solid #1f2937;
            padding: 24px;
            box-shadow: 0 25px 50px -12px #000000;
        }

        .header {
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #3b82f6;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header .badge {
            background: #1e293b;
            color: #3b82f6;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid #3b82f640;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .editor-box {
            background: #0d1117;
            border: 1px solid #1f2937;
            border-radius: 12px;
            overflow: hidden;
        }

        .editor-header {
            background: #1a1f2b;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2937;
        }

        .editor-header span {
            color: #e5e7eb;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats {
            display: flex;
            gap: 12px;
            color: #9ca3af;
            font-size: 0.9rem;
        }

        textarea {
            width: 100%;
            height: 500px;
            background: #0a0c10;
            border: none;
            padding: 18px;
            color: #e5e7eb;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
        }

        textarea::placeholder {
            color: #2d3748;
        }

        textarea[readonly] {
            background: #0a0c10;
            color: #3b82f6;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #1e293b;
            color: #e5e7eb;
            border: 1px solid #1f2937;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px #2563eb80;
        }

        .btn:hover {
            background: #2d3748;
        }

        .btn-small {
            padding: 6px 14px;
            font-size: 0.85rem;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 16px 0;
        }

        .feature {
            background: #1a1f2b;
            color: #9ca3af;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.8rem;
            border: 1px solid #1f2937;
        }

        .feature.active {
            background: #2563eb20;
            border-color: #2563eb;
            color: #3b82f6;
        }

        .footer {
            text-align: center;
            color: #4b5563;
            font-size: 0.8rem;
            margin-top: 24px;
            border-top: 1px solid #1f2937;
            padding-top: 20px;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 16, 0.9);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1f2937;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1f2b;
            color: #e5e7eb;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 10000;
            border-left: 4px solid #2563eb;
            box-shadow: 0 10px 25px -5px #000000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            border-left-color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <div class="container">
        <div class="header">
            <h1>MK</h1>
            <div class="badge">v2.0 • functional</div>
        </div>

        <div class="main-content">
            <div class="editor-box">
                <div class="editor-header">
                    <span>input</span>
                    <div class="stats">
                        <span id="inputLines">0L</span>
                        <span id="inputChars">0C</span>
                    </div>
                </div>
                <textarea id="inputScript" placeholder="paste your lua script here..."></textarea>
            </div>

            <div class="editor-box">
                <div class="editor-header">
                    <span>output</span>
                    <div class="stats">
                        <button class="btn btn-small" onclick="copyOutput()">copy</button>
                        <button class="btn btn-small" onclick="downloadOutput()">save</button>
                    </div>
                </div>
                <textarea id="outputScript" placeholder="obfuscated code will appear here..." readonly></textarea>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="obfuscate()">OBFUSCATE</button>
            <button class="btn" onclick="loadExample()">example</button>
            <button class="btn" onclick="clearAll()">clear</button>
        </div>

        <div class="features">
            <span class="feature active">return wrapper</span>
            <span class="feature active">hex strings</span>
            <span class="feature active">rename vars</span>
            <span class="feature active">infinite loops</span>
            <span class="feature active">control flow</span>
            <span class="feature active">compact</span>
        </div>

        <div class="footer">
            MK OBFUSCATOR • all scripts execute correctly
        </div>
    </div>

    <script>
        const input = document.getElementById('inputScript');
        const output = document.getElementById('outputScript');
        const lines = document.getElementById('inputLines');
        const chars = document.getElementById('inputChars');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMessage');

        function updateStats() {
            const t = input.value;
            lines.textContent = t.split('\n').length + 'L';
            chars.textContent = t.length + 'C';
        }
        input.addEventListener('input', updateStats);

        function showToast(msg, err) {
            toastMsg.textContent = msg;
            toast.classList.add('show');
            if (err) toast.classList.add('error');
            else toast.classList.remove('error');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function copyOutput() {
            if (!output.value) return showToast('no output', true);
            output.select();
            document.execCommand('copy');
            showToast('copied!');
        }

        function downloadOutput() {
            if (!output.value) return showToast('no output', true);
            const blob = new Blob([output.value], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'mk.lua';
            a.click();
            showToast('downloaded!');
        }

        function loadExample() {
            input.value = `local function sum(a,b)
    return a+b
end

local x=10
local y=20
print(sum(x,y))

local t={1,2,3,4,5}
for i=1,#t do
    print(t[i])
end`;
            updateStats();
            showToast('example loaded');
        }

        function clearAll() {
            input.value = '';
            output.value = '';
            updateStats();
            showToast('cleared');
        }

        function rand(l) {
            const c = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_';
            let r = '';
            for (let i = 0; i < l; i++) r += c[Math.floor(Math.random() * c.length)];
            return r;
        }

        function hex(s) {
            let h = '';
            for (let i = 0; i < s.length; i++) {
                let c = s.charCodeAt(i).toString(16);
                if (c.length < 2) c = '0' + c;
                h += '\\x' + c;
            }
            return h;
        }

        function obfuscate() {
            const original = input.value.trim();
            if (!original) return showToast('no input', true);

            loading.classList.add('show');

            setTimeout(() => {
                try {
                    const obf = generate(original);
                    output.value = obf;
                    showToast('obfuscated!');
                } catch (e) {
                    showToast('error: ' + e.message, true);
                }
                loading.classList.remove('show');
            }, 100);
        }

        function generate(code) {
            const vars = {};
            let vc = 0;
            const pre = ['_0x','_0x0','_0x1','_0x2','_0x3','_0x4','_K','_G','_D','_A','_r','_y'];

            let processed = [];

            // Process each line
            let lines = code.split('\n');
            for (let line of lines) {
                if (line.trim() === '') continue;

                // Rename locals
                line = line.replace(/local\s+([a-zA-Z_][a-zA-Z0-9_]*)/g, (m, v) => {
                    if (!vars[v]) vars[v] = pre[vc++ % pre.length] + Math.floor(Math.random() * 999);
                    return 'local ' + vars[v];
                });

                // Replace variable usage
                for (let [oldName, newName] of Object.entries(vars)) {
                    const re = new RegExp('\\b' + oldName + '\\b', 'g');
                    line = line.replace(re, newName);
                }

                // Hex strings
                line = line.replace(/"([^"\\]*(\\.[^"\\]*)*)"/g, (m, s) => '"' + hex(s) + '"');
                line = line.replace(/'([^'\\]*(\\.[^'\\]*)*)'/g, (m, s) => '"' + hex(s) + '"');

                processed.push(line);
            }

            // Generate random table
            function genTable() {
                let t = 'local A={';
                for (let i = 0; i < 50; i++) {
                    let s = '';
                    for (let j = 0; j < Math.floor(Math.random() * 5) + 2; j++) {
                        s += String.fromCharCode(Math.floor(Math.random() * 26) + 97);
                    }
                    t += '`' + btoa(s).replace(/=/g, '') + '`';
                    if (i < 49) t += ',';
                }
                t += '}';
                return t;
            }

            // Generate loops (WITH BREAK - so they EXECUTE)
            function genLoops() {
                const a = rand(4);
                const b = rand(4);
                const c = rand(4);
                let l = '';
                
                l += 'local ' + a + ',' + b + ',' + c + '=0,1,2';
                l += 'while true do';
                l += a + '=' + a + '+1';
                l += b + '=' + b + '+' + c;
                l += 'if ' + a + '>50 then';
                l += 'break';
                l += 'end';
                l += 'end';
                
                l += 'repeat';
                l += 'local ' + rand(4) + '=function()';
                l += 'local ' + rand(4) + '=1';
                l += 'while ' + rand(4) + '<10 do';
                l += rand(4) + '=' + rand(4) + '+1';
                l += 'end';
                l += 'return ' + rand(4);
                l += 'end';
                l += 'until false';
                
                return l;
            }

            // Build FINAL EXECUTABLE CODE
            let final = 'return(function(...)';

            // Table
            final += genTable();

            // Decoder function
            final += 'local function ' + rand(4) + '(K)return(A)[K-' + Math.floor(Math.random() * 500) + 61571 + ']end';

            // Swap loops
            final += 'for K,G in ipairs{{1,' + Math.floor(Math.random() * 200) + '},{1,' + 
                     Math.floor(Math.random() * 150) + '},{' + Math.floor(Math.random() * 100) + ',' + 
                     Math.floor(Math.random() * 200) + '}}do while(G)[1]<(G)[2]do(A)[(G)[1]],(A)[(G)[2]],(G)[1],(G)[2]=(A)[(G)[2]],(A)[(G)[1]],(G)[1]+1,(G)[2]-1 end end';

            // Loader
            final += 'local ' + rand(4) + '=loadstring or load';
            final += 'local ' + rand(4) + '=print';

            // Loops
            final += genLoops();

            // Main code (COMPACT)
            final += processed.join('').replace(/\s+/g, '');

            // Final wrapper
            final += 'end)(...)';

            return final;
        }

        // Initialize
        loadExample();
    </script>
</body>
</html>
