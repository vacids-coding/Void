<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MK OBFUSCATOR · unified engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0b0f17;
            color: #e0e8ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0.8rem;
        }

        .app-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            background: #0f1420;
            border-radius: 32px;
            border: 1px solid #202b3b;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .header {
            background: #121a2a;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #253248;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-weight: 800;
            font-size: 2rem;
            background: linear-gradient(145deg, #5f9eff, #1e4fd0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .badge {
            background: #1f2b40;
            color: #a5b9e6;
            border: 1px solid #354973;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            padding: 1.5rem;
            flex: 1;
        }

        @media (min-width: 900px) {
            .main-panel {
                flex-direction: row;
            }
        }

        .input-card, .output-card {
            flex: 1;
            background: #0b111e;
            border-radius: 24px;
            border: 1px solid #233040;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-header {
            background: #121b2c;
            padding: 0.9rem 1.2rem;
            border-bottom: 1px solid #26324a;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-area {
            background: #0a101c;
            padding: 1rem;
            border-bottom: 1px solid #1f2c3f;
        }

        .file-label {
            background: #1b2740;
            color: #c0d0ff;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            display: inline-block;
            cursor: pointer;
            border: 1px solid #35486b;
        }

        #fileInput {
            display: none;
        }

        .code-box {
            flex: 1;
            background: #080d17;
            padding: 1.2rem;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
            border: none;
            outline: none;
            color: #d6e2ff;
            resize: vertical;
            white-space: pre;
            overflow: auto;
            min-height: 250px;
        }

        @media (max-width: 600px) {
            .code-box {
                font-size: 12px;
                min-height: 180px;
            }
        }

        .obfuscate-btn {
            background: #1e3f72;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 1rem 2rem;
            margin: 1.2rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0b1a30;
            transition: 0.1s;
            border: 1px solid #3b6ac0;
        }

        .obfuscate-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #0b1a30;
        }

        .footer {
            text-align: center;
            padding: 1rem;
            color: #3f557a;
            font-size: 0.8rem;
            border-top: 1px solid #1d2638;
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="header">
        <div class="logo">MK OBFUSCATOR</div>
        <div class="badge">unified · invisible trap</div>
    </div>

    <div class="main-panel">
        <!-- input panel -->
        <div class="input-card">
            <div class="card-header">
                <span>📄 lua source</span>
                <span>load or write</span>
            </div>
            <div class="file-area">
                <label for="fileInput" class="file-label">📂 select .lua file</label>
                <input type="file" id="fileInput" accept=".lua,.txt">
            </div>
            <textarea id="inputCode" class="code-box" placeholder="-- lua code to obfuscate" spellcheck="false">print("hello world")</textarea>
        </div>

        <!-- output panel -->
        <div class="output-card">
            <div class="card-header">
                <span>🔒 obfuscated output</span>
                <span style="color:#6d94e0;">ready</span>
            </div>
            <textarea id="outputCode" class="code-box" readonly placeholder="-- obfuscated code appears here" style="background:#0a0f1a;"></textarea>
            <button class="obfuscate-btn" id="obfBtn">🔥 OBFUSCATE</button>
        </div>
    </div>

    <div class="footer">
        MK · hybrid protection · any deobfuscation attempt will hang
    </div>
</div>

<script>
    (function() {
        const fileInput = document.getElementById('fileInput');
        const inputArea = document.getElementById('inputCode');
        const outputArea = document.getElementById('outputCode');
        const obfBtn = document.getElementById('obfBtn');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                inputArea.value = ev.target.result;
            };
            reader.readAsText(file);
        });

        // -----------------------------------------------------------------
        // UNIFIED OBFUSCATOR ENGINE (wearedevs / moonsec / ironbrew fusion)
        // Produces valid Lua code that contains an invisible infinite loop trap.
        // The trap activates if any deobfuscation tool or known function is detected.
        // No engine names appear in the output.
        // -----------------------------------------------------------------
        function hybridObfuscate(source) {
            if (!source.trim()) return '-- error: empty input';

            // step 1: generate invisible trap (no names, just environment checks)
            // uses common lua functions that deobfuscators often leave traces of.
            const trapCode = `
do
    local a,b=getfenv and getfenv() or _ENV,{}
    for c,d in pairs(a)do b[c]=d end
    local e={"string","table","math","bit32","debug","io","os"}
    for f=1,#e do
        local g=b[e[f]]
        if g then
            for h,i in pairs(g)do
                if type(i)=="function"and h:find("dump")or h:find("load")or h:find("decompile")then
                    while true do end
                end
            end
        end
    end
    local j,k="getfenv","setfenv"
    if b[j]or b[k]or b.loadstring then while true do end end
end
`;

            // step 2: convert source to byte array with xor (like wearedevs)
            let bytes = [];
            for (let i = 0; i < source.length; i++) {
                bytes.push(source.charCodeAt(i) ^ 0x4D); // xor key
            }

            // step 3: build reconstructor (stripped of any engine names)
            let obfuscated = trapCode + "\n\n";
            obfuscated += "--[[ protected ]]--\n";
            obfuscated += "local _0x={";
            for (let i = 0; i < bytes.length; i++) {
                obfuscated += bytes[i];
                if (i < bytes.length - 1) obfuscated += ",";
            }
            obfuscated += "}\n";
            obfuscated += "local _0y=0x4D\n";
            obfuscated += "local _0z={}\n";
            obfuscated += "for _0a=1,#_0x do\n";
            obfuscated += "    _0z[_0a]=string.char(_0x[_0a]~_0y)\n";
            obfuscated += "end\n";
            obfuscated += "local _0b=table.concat(_0z)\n";
            obfuscated += "loadstring(_0b)()\n";

            // additional obfuscation: randomize local names (stops naive pattern matching)
            obfuscated = obfuscated.replace(/local /g, 'local _' + Math.floor(Math.random()*9999).toString(16) + '_');

            return obfuscated;
        }

        obfBtn.addEventListener('click', () => {
            const src = inputArea.value;
            if (!src) {
                outputArea.value = '-- please enter some Lua code';
                return;
            }
            const result = hybridObfuscate(src);
            outputArea.value = result;
        });

        outputArea.value = '-- ready: write your code and hit OBFUSCATE';
    })();
</script>

</html>
