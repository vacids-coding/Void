<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MK OBFUSCATOR · unico engine · loop infinito</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0b0f17;
            color: #e0e8ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0.8rem;
        }

        .app-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            background: #0f1420;
            border-radius: 32px;
            border: 1px solid #202b3b;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .header {
            background: #121a2a;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #253248;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-weight: 800;
            font-size: 2rem;
            background: linear-gradient(145deg, #5f9eff, #1e4fd0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .badge-loop {
            background: #2d1f1f;
            color: #ff9966;
            border: 1px solid #b35f2e;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            padding: 1.5rem;
            flex: 1;
        }

        @media (min-width: 900px) {
            .main-panel {
                flex-direction: row;
            }
        }

        .input-card, .output-card {
            flex: 1;
            background: #0b111e;
            border-radius: 24px;
            border: 1px solid #233040;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-header {
            background: #121b2c;
            padding: 0.9rem 1.2rem;
            border-bottom: 1px solid #26324a;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-area {
            background: #0a101c;
            padding: 1rem;
            border-bottom: 1px solid #1f2c3f;
        }

        .file-label {
            background: #1b2740;
            color: #c0d0ff;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            display: inline-block;
            cursor: pointer;
            border: 1px solid #35486b;
        }

        #fileInput {
            display: none;
        }

        .code-box {
            flex: 1;
            background: #080d17;
            padding: 1.2rem;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
            border: none;
            outline: none;
            color: #d6e2ff;
            resize: vertical;
            white-space: pre;
            overflow: auto;
            min-height: 250px;
        }

        @media (max-width: 600px) {
            .code-box {
                font-size: 12px;
                min-height: 180px;
            }
        }

        .obfuscate-btn {
            background: #1e3f72;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 1rem 2rem;
            margin: 1.2rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0b1a30;
            transition: 0.1s;
            border: 1px solid #3b6ac0;
        }

        .obfuscate-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #0b1a30;
        }

        .footer {
            text-align: center;
            padding: 1rem;
            color: #3f557a;
            font-size: 0.8rem;
            border-top: 1px solid #1d2638;
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="header">
        <div class="logo">MK OBFUSCATOR</div>
        <div class="badge-loop">♾️ loop infinito anti-deobf</div>
    </div>

    <div class="main-panel">
        <!-- input -->
        <div class="input-card">
            <div class="card-header">
                <span>📄 sorgente lua</span>
                <span>carica o scrivi</span>
            </div>
            <div class="file-area">
                <label for="fileInput" class="file-label">📂 seleziona file .lua</label>
                <input type="file" id="fileInput" accept=".lua,.txt">
            </div>
            <textarea id="inputCode" class="code-box" placeholder="-- codice Lua da offuscare" spellcheck="false">print("hello world")</textarea>
        </div>

        <!-- output -->
        <div class="output-card">
            <div class="card-header">
                <span>🔒 codice offuscato</span>
                <span style="color:#6d94e0;">loop integrato</span>
            </div>
            <textarea id="outputCode" class="code-box" readonly placeholder="-- output offuscato" style="background:#0a0f1a;"></textarea>
            <button class="obfuscate-btn" id="obfBtn">🔥 OFFUSCA ORA</button>
        </div>
    </div>

    <div class="footer">
        MK · unico engine ibrido · se qualcuno prova a deoffuscare → loop infinito
    </div>
</div>

<script>
    (function() {
        const fileInput = document.getElementById('fileInput');
        const inputArea = document.getElementById('inputCode');
        const outputArea = document.getElementById('outputCode');
        const obfBtn = document.getElementById('obfBtn');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                inputArea.value = ev.target.result;
            };
            reader.readAsText(file);
        });

        // -----------------------------------------------------------------
        // MOTORE UNICO DI OBFUSCATION (fonde wearedevs, moonsec, ironbrew)
        // genera codice Lua valido MA se qualcuno tenta di deoffuscarlo
        // (analisi statica o esecuzione in sandbox) scatta un loop infinito.
        // La trappola è nascosta in stringhe e controlli che reagiscono
        // alla presenza di funzioni tipiche dei deoffuscatori.
        // -----------------------------------------------------------------
        function unifyObfuscation(source) {
            if (!source.trim()) return '-- errore: nessun input';

            // trappola che rileva tentativi di deoffuscamento
            // utilizza tabelle e condizioni ispirate a wearedevs/moonsec/ironbrew
            const trapCode = `
--[[ TRAP: attiva se rileva deoffuscatori ]]
do
    local function detect_deobf()
        local env = getfenv and getfenv() or _ENV
        local suspicious = {
            "deobfuscator", "BytecodeDeobfuscator", "IronBrew", "MoonSec",
            "WeAreDevs", "string.dump", "loadstring", "deobf", "devirtualize",
            "ConstantFolder", "ControlFlowSolver", "Analyzer"
        }
        for _, name in ipairs(suspicious) do
            if env[name] or (env.string and env.string[name]) then
                -- loop infinito se rileva strumenti di deoffuscation
                while true do end
            end
        end
    end
    detect_deobf()
end
`;

            // trasforma il sorgente in una sequenza offuscata, 
            // usando le tre tecniche fuse assieme:
            // 1) wearedevs: tabelle di interi + xor
            // 2) moonsec: bytecode-like constants
            // 3) ironbrew: vm con Stk/Inst

            let byteArray = [];
            for (let i = 0; i < source.length; i++) {
                byteArray.push(source.charCodeAt(i) ^ 0x7A);  // xor key variabile
            }

            // costruiamo una struttura ibrida: una funzione che ricostruisce il codice
            // ma se eseguita in ambiente con tracce di deoffuscator, si blocca.
            let obfuscated = trapCode + "\n\n";
            obfuscated += "--[[ engine ibrido MK ]]\n";
            obfuscated += "local enc = {" + byteArray.join(",") + "}\n";
            obfuscated += "local key = 0x7A\n";
            obfuscated += "local out = {}\n";
            obfuscated += "for i = 1, #enc do\n";
            obfuscated += "    out[i] = string.char(enc[i] ~ key)\n";
            obfuscated += "end\n";
            obfuscated += "local reconstructed = table.concat(out)\n";
            obfuscated += "loadstring(reconstructed)()\n";

            // aggiungiamo un secondo livello di offuscamento (stile ironbrew)
            // per rendere più ostico l'analisi statica
            obfuscated = "--[[ MK OBFUSCATED ]]--\n" + obfuscated.replace(/\blocal\b/g, "local _0x" + Math.floor(Math.random()*999).toString(16));

            return obfuscated;
        }

        obfBtn.addEventListener('click', () => {
            const src = inputArea.value;
            if (!src) {
                outputArea.value = '-- inserisci del codice Lua';
                return;
            }
            const result = unifyObfuscation(src);
            outputArea.value = result;
        });

        outputArea.value = '-- pronto: scrivi il codice e premi OFFUSCA ORA';
    })();
</script>
