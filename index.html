<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK OBFUSCATOR 1.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 1400px;
            max-width: 100%;
            background: #0a0a0a;
            border: 2px solid #0066cc;
            border-radius: 8px;
            padding: 30px;
        }
        
        .title {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #0066cc;
            padding-bottom: 20px;
        }
        
        .title h1 {
            color: #0066cc;
            font-size: 42px;
            font-weight: bold;
            text-shadow: 0 0 10px #0066cc;
        }
        
        .title h1 span {
            color: #ffffff;
        }
        
        .title p {
            color: #3399ff;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .main-row {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .input-area, .output-area {
            flex: 1;
            background: #111111;
            border: 1px solid #0066cc;
            border-radius: 4px;
            padding: 20px;
        }
        
        .input-area label, .output-area label {
            color: #0066cc;
            display: block;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        
        textarea {
            width: 100%;
            height: 400px;
            background: #1a1a1a;
            border: 1px solid #0066cc;
            color: #00ff00;
            font-size: 14px;
            padding: 15px;
            resize: none;
            outline: none;
        }
        
        textarea::placeholder {
            color: #336699;
        }
        
        .output-box {
            width: 100%;
            height: 400px;
            background: #1a1a1a;
            border: 1px solid #0066cc;
            color: #00ff00;
            font-size: 14px;
            padding: 15px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .center-button {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .obfuscate-btn {
            background: #0066cc;
            color: white;
            border: none;
            padding: 20px 30px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: -5px;
            border-radius: 4px;
            transition: 0.3s;
        }
        
        .obfuscate-btn:hover {
            background: #3399ff;
            box-shadow: 0 0 20px #0066cc;
        }
        
        .copy-btn {
            background: #1a1a1a;
            color: #0066cc;
            border: 1px solid #0066cc;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }
        
        .copy-btn:hover {
            background: #0066cc;
            color: white;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #0066cc;
            border-top: 1px solid #0066cc;
            padding-top: 20px;
            font-size: 12px;
        }
        
        @media (max-width: 900px) {
            .main-row {
                flex-direction: column;
            }
            
            .obfuscate-btn {
                writing-mode: horizontal-tb;
                padding: 15px 30px;
                letter-spacing: normal;
            }
            
            textarea, .output-box {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>MK <span>OBFUSCATOR</span></h1>
            <p>PROFESSIONAL LUA OBFUSCATION • ANTI-DEOBFUSCATOR</p>
        </div>
        
        <div class="main-row">
            <div class="input-area">
                <label>INPUT</label>
                <textarea id="inputCode" placeholder="Paste your Lua code here..."></textarea>
            </div>
            
            <div class="center-button">
                <button class="obfuscate-btn" onclick="obfuscate()">OBFUSCATE</button>
                <button class="copy-btn" onclick="copyOutput()">COPY</button>
            </div>
            
            <div class="output-area">
                <label>OUTPUT</label>
                <div id="outputCode" class="output-box">-- [[ MK OBFUSCATOR 1.0 ]]</div>
            </div>
        </div>
        
        <div class="footer">
            MK OBFUSCATOR 1.0 • BLUE & BLACK EDITION • INFINITE LOOP PROTECTION
        </div>
    </div>

    <script>
        function obfuscate() {
            let input = document.getElementById('inputCode').value;
            if (!input.trim()) {
                alert('Insert code to obfuscate');
                return;
            }
            
            let obfuscated = antiDeobfuscator() + '\n\n' + realObfuscator(input);
            document.getElementById('outputCode').innerText = '-- [[ MK OBFUSCATOR 1.0 ]]\n' + obfuscated;
        }
        
        function antiDeobfuscator() {
            return [[${_G}]]..local _0x00=setmetatable({},{__index=function()while true do end end})..local _0x01=newproxy and newproxy(true) or {}..getmetatable(_0x01).__index=function()return _0x00 end..getmetatable(_0x01).__newindex=function()error("ACCESS DENIED") end..setmetatable(_G,getmetatable(_0x01));
        }
        
        function realObfuscator(code) {
            let varMap = {};
            let varCounter = 0;
            let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
            
            let lines = code.split('\n');
            let result = [];
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                
                line = line.replace(/local\s+([a-zA-Z_][a-zA-Z0-9_]*)/g, function(match, name) {
                    if (!varMap[name]) {
                        let newName = "_";
                        for (let j = 0; j < 8; j++) {
                            newName += chars[Math.floor(Math.random() * chars.length)];
                        }
                        varMap[name] = newName;
                    }
                    return "local " + varMap[name];
                });
                
                for (let name in varMap) {
                    let regex = new RegExp('\\b' + name + '\\b', 'g');
                    line = line.replace(regex, varMap[name]);
                }
                
                line = line.replace(/"(.*?)"/g, function(match) {
                    let encoded = "";
                    for (let j = 1; j < match.length - 1; j++) {
                        encoded += "\\" + match.charCodeAt(j);
                    }
                    return '"' + encoded + '"';
                });
                
                line = line.replace(/'(.*?)'/g, function(match) {
                    let encoded = "";
                    for (let j = 1; j < match.length - 1; j++) {
                        encoded += "\\" + match.charCodeAt(j);
                    }
                    return "'" + encoded + "'";
                });
                
                result.push(line);
            }
            
            let finalCode = result.join('\n');
            
            finalCode = finalCode.replace(/print/g, "print");
            finalCode = finalCode.replace(/wait/g, "wait");
            finalCode = finalCode.replace(/spawn/g, "spawn");
            
            return finalCode;
        }
        
        function copyOutput() {
            let output = document.getElementById('outputCode').innerText;
            navigator.clipboard.writeText(output).then(function() {
                alert('Copied!');
            });
        }
    </script>
</body>
</html>
