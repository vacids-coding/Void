<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MK OBFUSCATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            padding: 32px;
        }

        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            color: #64748b;
            font-size: 1rem;
            margin-top: 8px;
            font-weight: 400;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .editor-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .editor-card:hover {
            border-color: #94a3b8;
        }

        .editor-header {
            padding: 16px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats {
            display: flex;
            gap: 12px;
            color: #64748b;
            font-size: 0.875rem;
        }

        .stats span {
            background: white;
            padding: 4px 12px;
            border-radius: 100px;
            border: 1px solid #e2e8f0;
        }

        textarea {
            width: 100%;
            height: 450px;
            padding: 20px;
            border: none;
            background: white;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #1e293b;
            resize: vertical;
            outline: none;
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        textarea[readonly] {
            background: #f8fafc;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 24px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
            border: 1px solid #e2e8f0;
            color: #1e293b;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px #2563eb80;
        }

        .btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .btn-small {
            padding: 6px 16px;
            font-size: 0.875rem;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 24px 0 8px;
        }

        .feature {
            padding: 6px 16px;
            background: #f1f5f9;
            color: #1e293b;
            border-radius: 100px;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid #e2e8f0;
        }

        .feature.active {
            background: #2563eb10;
            border-color: #2563eb;
            color: #2563eb;
        }

        .footer {
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 10000;
            box-shadow: 0 10px 30px -10px #00000040;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <div class="container">
        <div class="header">
            <h1>MK OBFUSCATOR</h1>
            <div class="subtitle">professional lua code protection</div>
        </div>

        <div class="main-content">
            <div class="editor-card">
                <div class="editor-header">
                    <h3>input</h3>
                    <div class="stats">
                        <span id="inputLines">0 lines</span>
                        <span id="inputChars">0 chars</span>
                    </div>
                </div>
                <textarea id="inputScript" placeholder="paste your lua script here..."></textarea>
            </div>

            <div class="editor-card">
                <div class="editor-header">
                    <h3>output</h3>
                    <div class="stats">
                        <button class="btn btn-small" onclick="copyOutput()">copy</button>
                        <button class="btn btn-small" onclick="downloadOutput()">download</button>
                    </div>
                </div>
                <textarea id="outputScript" placeholder="obfuscated code will appear here..." readonly></textarea>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="obfuscate()">obfuscate</button>
            <button class="btn" onclick="loadExample()">load example</button>
            <button class="btn" onclick="clearAll()">clear</button>
        </div>

        <div class="features">
            <span class="feature active">return wrapper</span>
            <span class="feature active">hex strings</span>
            <span class="feature active">variable rename</span>
            <span class="feature active">infinite loops</span>
            <span class="feature active">control flow</span>
            <span class="feature active">no spaces</span>
        </div>

        <div class="footer">
            MK OBFUSCATOR • all techniques active
        </div>
    </div>

    <script>
        // DOM elements
        const inputScript = document.getElementById('inputScript');
        const outputScript = document.getElementById('outputScript');
        const inputLines = document.getElementById('inputLines');
        const inputChars = document.getElementById('inputChars');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // Update stats
        function updateStats() {
            const text = inputScript.value;
            const lines = text.split('\n').length;
            const chars = text.length;
            inputLines.textContent = lines + ' line' + (lines !== 1 ? 's' : '');
            inputChars.textContent = chars + ' char' + (chars !== 1 ? 's' : '');
        }
        inputScript.addEventListener('input', updateStats);
        updateStats();

        // Toast
        function showToast(msg, isError) {
            toastMessage.textContent = msg;
            toast.classList.add('show');
            if (isError) toast.classList.add('error');
            else toast.classList.remove('error');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Copy
        function copyOutput() {
            if (!outputScript.value) return showToast('no output to copy', true);
            outputScript.select();
            document.execCommand('copy');
            showToast('copied to clipboard');
        }

        // Download
        function downloadOutput() {
            if (!outputScript.value) return showToast('no output to download', true);
            const blob = new Blob([outputScript.value], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mk_obfuscated.lua';
            a.click();
            URL.revokeObjectURL(url);
            showToast('file downloaded');
        }

        // Load example
        function loadExample() {
            inputScript.value = `local function calculate(a, b)
    return a * b + (a - b)
end

local data = {10, 20, 30, 40, 50}
local total = 0

for i = 1, #data do
    total = total + calculate(data[i], i)
end

print("result: " .. total)`;
            updateStats();
            showToast('example loaded');
        }

        // Clear
        function clearAll() {
            inputScript.value = '';
            outputScript.value = '';
            updateStats();
            showToast('all cleared');
        }

        // Random string
        function randStr(len) {
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_';
            let r = '';
            for (let i = 0; i < len; i++) r += chars[Math.floor(Math.random() * chars.length)];
            return r;
        }

        // To hex
        function toHex(str) {
            let h = '';
            for (let i = 0; i < str.length; i++) {
                let c = str.charCodeAt(i).toString(16);
                if (c.length < 2) c = '0' + c;
                h += '\\x' + c;
            }
            return h;
        }

        // Generate table
        function generateTable() {
            let tbl = 'local A={';
            for (let i = 0; i < 100; i++) {
                let s = '';
                for (let j = 0; j < Math.floor(Math.random() * 8) + 3; j++) {
                    s += String.fromCharCode(Math.floor(Math.random() * 26) + 97);
                }
                s = btoa(s).replace(/=/g, '');
                tbl += '`' + s + '`';
                if (i < 99) tbl += ',';
            }
            tbl += '}';
            return tbl;
        }

        // Generate infinite loops
        function generateLoops() {
            const a = randStr(4);
            const b = randStr(4);
            const c = randStr(4);
            const d = randStr(4);
            
            let l = '';
            l += 'local ' + a + ',' + b + ',' + c + ',' + d + '=0,1,2,3';
            l += 'while true do';
            l += a + '=' + a + '+1';
            l += b + '=' + b + '+' + c;
            l += 'if ' + a + '>1000 then';
            l += a + '=0';
            l += 'break';
            l += 'end';
            l += 'end';
            
            l += 'repeat';
            l += 'local function ' + randStr(6) + '()';
            l += 'local ' + randStr(4) + ',' + randStr(4) + '=1,2';
            l += 'while true do';
            l += randStr(4) + ',' + randStr(4) + '=' + randStr(4) + ',' + randStr(4);
            l += 'if ' + randStr(4) + '()then break end';
            l += 'end';
            l += 'end';
            l += 'until false';
            
            return l;
        }

        // Generate loader
        function generateLoader() {
            return 'local ' + randStr(4) + '=loadstring or load' +
                   'local ' + randStr(4) + '=print' +
                   'local ' + randStr(4) + '=error' +
                   'local ' + randStr(4) + '=pcall';
        }

        // Main obfuscation
        function obfuscate() {
            const original = inputScript.value.trim();
            if (!original) return showToast('no input script', true);
            
            loading.classList.add('show');
            
            setTimeout(() => {
                try {
                    const obfuscated = generateObfuscated(original);
                    outputScript.value = obfuscated;
                    showToast('obfuscation complete');
                } catch (e) {
                    showToast('error: ' + e.message, true);
                } finally {
                    loading.classList.remove('show');
                }
            }, 100);
        }

        // Generate obfuscated code
        function generateObfuscated(code) {
            const varMap = {};
            let varCount = 0;
            const prefixes = ['_0x','_0x0','_0x1','_0x2','_0x3','_0x4','_K','_G','_D','_A','_r','_y'];
            
            // Process code
            let lines = code.split('\n');
            let processed = [];
            
            for (let line of lines) {
                if (line.trim() === '') continue;
                
                // Find local variables
                line = line.replace(/local\s+([a-zA-Z_][a-zA-Z0-9_]*)/g, (m, v) => {
                    if (!varMap[v]) varMap[v] = prefixes[varCount++ % prefixes.length] + Math.floor(Math.random() * 999);
                    return 'local ' + varMap[v];
                });
                
                // Replace variables
                for (let [oldName, newName] of Object.entries(varMap)) {
                    const regex = new RegExp('\\b' + oldName + '\\b', 'g');
                    line = line.replace(regex, newName);
                }
                
                // Convert strings to hex
                line = line.replace(/"([^"\\]*(\\.[^"\\]*)*)"/g, (m, s) => '"' + toHex(s) + '"');
                line = line.replace(/'([^'\\]*(\\.[^'\\]*)*)'/g, (m, s) => '"' + toHex(s) + '"');
                
                processed.push(line);
            }
            
            // Build final code (ALL ATTACCATO)
            let final = 'return(function(...)';
            
            // Add table
            final += generateTable();
            
            // Add D function
            final += 'local function ' + randStr(4) + '(K)return(A)[K-' + Math.floor(Math.random() * 1000) + ']end';
            
            // Add swap loops
            final += 'for K,G in ipairs{{1,' + Math.floor(Math.random() * 500) + '},{1,' + 
                     Math.floor(Math.random() * 300) + '},{' + Math.floor(Math.random() * 200) + ',' + 
                     Math.floor(Math.random() * 500) + '}}do while(G)[1]<(G)[2]do(A)[(G)[1]],(A)[(G)[2]],(G)[1],(G)[2]=(A)[(G)[2]],(A)[(G)[1]],(G)[1]+1,(G)[2]-1 end end';
            
            // Add loader and loops
            final += generateLoader();
            final += generateLoops();
            
            // Add processed code (NO SPACES)
            final += processed.join('').replace(/\s+/g, '');
            
            // Final infinite loop
            const x = randStr(4);
            const y = randStr(4);
            final += 'local ' + x + ',' + y + '=1,2';
            final += 'while true do';
            final += x + ',' + y + '=' + y + ',' + x;
            final += 'if ' + x + '>' + y + 'then';
            final += x + '=' + y;
            final += 'break';
            final += 'end';
            final += 'end';
            
            // Close return wrapper
            final += 'end)(...)';
            
            return final;
        }

        // Initialize
        loadExample();
    </script>
</body>
</html>
