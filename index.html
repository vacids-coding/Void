<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MK OBFUSCATOR 1.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }
        
        body {
            background-color: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            background-color: #0d0d0d;
            border: 1px solid #1a4c7a;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 40, 80, 0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
            border-bottom: 1px solid #1a4c7a;
            padding-bottom: 20px;
        }
        
        .header h1 {
            color: #2a6fa5;
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        
        .header h1 span {
            color: #ffffff;
            font-weight: 300;
        }
        
        .header p {
            color: #4a7a9c;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .main-content {
            display: flex;
            flex-direction: row;
            gap: 24px;
            flex-wrap: wrap;
        }
        
        .input-section, .output-section {
            flex: 1 1 300px;
            background-color: #111111;
            border: 1px solid #1a3f5a;
            border-radius: 20px;
            padding: 20px;
        }
        
        .section-title {
            color: #2a6fa5;
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title::before {
            content: "◉";
            color: #1a4c7a;
            font-size: 1rem;
        }
        
        textarea {
            width: 100%;
            height: 300px;
            background-color: #0a0a0a;
            border: 1px solid #1a3f5a;
            border-radius: 16px;
            padding: 16px;
            color: #c0d0e0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        
        textarea:focus {
            border-color: #2a6fa5;
        }
        
        textarea::placeholder {
            color: #2a4055;
            font-style: italic;
        }
        
        .output-area {
            width: 100%;
            height: 300px;
            background-color: #0a0a0a;
            border: 1px solid #1a3f5a;
            border-radius: 16px;
            padding: 16px;
            color: #c0d0e0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .output-area::-webkit-scrollbar {
            width: 8px;
        }
        
        .output-area::-webkit-scrollbar-track {
            background: #0d0d0d;
        }
        
        .output-area::-webkit-scrollbar-thumb {
            background: #1a4c7a;
            border-radius: 4px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            background-color: transparent;
            border: 1px solid #1a4c7a;
            color: #c0d0e0;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 140px;
        }
        
        .btn:hover {
            background-color: #1a4c7a;
            color: #ffffff;
            border-color: #2a6fa5;
        }
        
        .btn-primary {
            background-color: #1a4c7a;
            color: #ffffff;
            border-color: #2a6fa5;
        }
        
        .btn-primary:hover {
            background-color: #2a6fa5;
        }
        
        .footer {
            margin-top: 32px;
            text-align: center;
            color: #1a4c7a;
            font-size: 0.8rem;
            border-top: 1px solid #1a4c7a;
            padding-top: 20px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 16px 0;
            color: #2a5f7a;
            font-size: 0.9rem;
        }
        
        .stats span {
            color: #2a6fa5;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            textarea, .output-area {
                height: 200px;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MK <span>OBFUSCATOR</span></h1>
            <p>Professional Lua Obfuscation</p>
        </div>
        
        <div class="main-content">
            <div class="input-section">
                <div class="section-title">INPUT</div>
                <textarea id="inputCode" placeholder="Paste your Lua code here...">local player = game:GetService("Players").LocalPlayer
print("Hello World")</textarea>
            </div>
            
            <div class="output-section">
                <div class="section-title">OUTPUT</div>
                <div id="outputCode" class="output-area">-- [[ MK OBFUSCATOR 1.0 ]]</div>
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn" onclick="obfuscate()">OBFUSCATE</button>
            <button class="btn" onclick="copyToClipboard()">COPY</button>
            <button class="btn" onclick="clearAll()">CLEAR</button>
        </div>
        
        <div class="stats">
            <div>LENGTH: <span id="inputLength">0</span></div>
            <div>OBFUSCATED: <span id="outputLength">0</span></div>
        </div>
        
        <div class="footer">
            MK OBFUSCATOR 1.0 • BLUE & BLACK EDITION
        </div>
    </div>

    <script>
        function obfuscate() {
            const input = document.getElementById('inputCode').value;
            if (!input.trim()) {
                alert('Please enter some code to obfuscate');
                return;
            }
            
            let obfuscated = obfuscateLua(input);
            document.getElementById('outputCode').innerText = '-- [[ MK OBFUSCATOR 1.0 ]]\n' + obfuscated;
            
            document.getElementById('inputLength').innerText = input.length;
            document.getElementById('outputLength').innerText = obfuscated.length;
        }
        
        function obfuscateLua(code) {
            let result = [];
            
            let varNames = {};
            let varCounter = 0;
            let chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
            
            let lines = code.split('\n');
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                
                line = line.replace(/local\s+([a-zA-Z_][a-zA-Z0-9_]*)/g, function(match, varName) {
                    if (!varNames[varName]) {
                        let newName = '_';
                        for (let j = 0; j < 5 + Math.floor(Math.random() * 5); j++) {
                            newName += chars[Math.floor(Math.random() * chars.length)];
                        }
                        varNames[varName] = newName;
                    }
                    return 'local ' + varNames[varName];
                });
                
                for (let varName in varNames) {
                    let regex = new RegExp('\\b' + varName + '\\b', 'g');
                    line = line.replace(regex, varNames[varName]);
                }
                
                line = line.replace(/"(.*?)"/g, function(match) {
                    let encoded = '';
                    for (let j = 0; j < match.length; j++) {
                        encoded += '\\' + match.charCodeAt(j);
                    }
                    return encoded;
                });
                
                line = line.replace(/'(.*?)'/g, function(match) {
                    let encoded = '';
                    for (let j = 0; j < match.length; j++) {
                        encoded += '\\' + match.charCodeAt(j);
                    }
                    return encoded;
                });
                
                result.push(line);
            }
            
            let finalCode = result.join('\n');
            
            finalCode = 'local _0x = string.char;local _0x0 = {};for _0x00=1,255 do _0x0[_0x00]=_0x(_0x00)end;' +
                       'local function _0x000(_0x0000)local _0x00000=""for _0x000000=1,#_0x0000 do ' +
                       'local _0x0000000=_0x0000:byte(_0x000000)_0x00000=_0x00000.._0x0[_0x0000000-13]end;return _0x00000 end;' +
                       'loadstring(_0x000("' + encodeToNumbers(finalCode) + '"))()';
            
            return finalCode;
        }
        
        function encodeToNumbers(str) {
            let result = '';
            for (let i = 0; i < str.length; i++) {
                let code = str.charCodeAt(i) + 13;
                result += '\\' + code;
            }
            return result;
        }
        
        function copyToClipboard() {
            let output = document.getElementById('outputCode').innerText;
            navigator.clipboard.writeText(output).then(function() {
                alert('Copied to clipboard!');
            }, function() {
                alert('Failed to copy');
            });
        }
        
        function clearAll() {
            document.getElementById('inputCode').value = '';
            document.getElementById('outputCode').innerText = '-- [[ MK OBFUSCATOR 1.0 ]]';
            document.getElementById('inputLength').innerText = '0';
            document.getElementById('outputLength').innerText = '0';
        }
        
        document.getElementById('inputCode').addEventListener('input', function() {
            document.getElementById('inputLength').innerText = this.value.length;
        });
    </script>
</body>
</html>
